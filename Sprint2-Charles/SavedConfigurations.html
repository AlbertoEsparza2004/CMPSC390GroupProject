<!DOCTYPE html>
<html>
<head>
  <title>Saved Configurations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/global-ui.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #07090f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    .page-bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 18% 35%, rgba(79,144,240,0.08) 0%, transparent 50%), radial-gradient(ellipse at 82% 70%, rgba(212,168,67,0.04) 0%, transparent 45%), linear-gradient(160deg, #0c1428 0%, #07090f 100%); z-index: 0; }
    header { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; padding: 24px; font-family: 'Orbitron', monospace; font-size: 1.25rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; }
    header span { color: #4f90f0; }
    .container { position: relative; z-index: 1; width: min(720px, calc(100% - 32px)) !important; margin: 40px auto !important; padding: 48px; background: rgba(12,20,40,0.45); border: none !important; border-radius: 24px; box-shadow: 0 0 60px rgba(79,144,240,0.2), 0 20px 40px rgba(0,0,0,0.5); }
    .container h2 { font-family: 'Orbitron', monospace; font-size: 1.6rem; font-weight: 900; margin-bottom: 28px; }
    #carsList { max-height: 70vh; overflow-y: auto; }
    .car { background: rgba(79,144,240,0.08); border: none; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .car strong { color: #fff; }
    .car { color: rgba(175,200,245,0.8); }
    .car-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .quick-links { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    button { padding: 10px 20px; background: linear-gradient(135deg, #4f90f0 0%, #6faeff 100%); border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.85rem; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(79,144,240,0.3); }
    button:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(79,144,240,0.5); }
    .page-action { margin-top: 10px; }

    /* Purchase modal */
    .modal-overlay {
      display: none !important; position: fixed !important; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.72); backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex !important; }
    .modal {
      background: rgba(10,16,33,0.98);
      border: 1px solid rgba(79,144,240,0.28);
      border-radius: 20px;
      padding: 32px 36px;
      width: min(480px, calc(100% - 32px));
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    }
    .modal h3 { font-family: 'Orbitron', monospace !important; font-size: 1.1rem !important; margin-bottom: 20px !important; color: #d8eaff !important; display: block !important; }
    .modal .mfield { margin-bottom: 14px; display: block; }
    .modal .mfield label { display: block !important; font-size: 0.85rem !important; color: rgba(175,200,245,0.85) !important; margin-bottom: 6px !important; width: 100% !important; }
    .modal .mfield input {
      display: block !important;
      width: 100% !important;
      background: rgba(8,13,28,0.9) !important;
      border: 1px solid rgba(79,144,240,0.3) !important;
      border-radius: 10px !important;
      color: #fff !important;
      padding: 10px 12px !important;
      font-size: 0.9rem !important;
      font-family: 'Inter', sans-serif !important;
      box-sizing: border-box !important;
    }
    .modal .mfield input:focus { outline: none !important; border-color: rgba(79,144,240,0.65) !important; }
    .modal-error { display: block !important; color: #f87171 !important; font-size: 0.85rem !important; margin-bottom: 12px; min-height: 18px; }
    .modal-actions { display: flex !important; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .cancel-btn {
      background: rgba(255,255,255,0.08) !important;
      box-shadow: none !important;
      border: 1px solid rgba(79,144,240,0.25) !important;
    }

    footer { position: relative; z-index: 1; text-align: center; padding: 32px 24px; border-top: 1px solid rgba(79,144,240,0.1); color: rgba(175,200,245,0.6); font-size: 0.85rem; margin-top: auto; }
  </style>

</head>

<body>
<div class="page-bg"></div>
<header>LEGACY<span>AUTO</span></header>

<!-- Purchase modal -->
<div class="modal-overlay" id="purchaseModal">
  <div class="modal">
    <h3>Purchase Build</h3>
    <div class="mfield">
      <label for="buyerName">Full Name</label>
      <input id="buyerName" type="text" placeholder="John Doe">
    </div>
    <div class="mfield">
      <label for="buyerAddress">Shipping Address</label>
      <input id="buyerAddress" type="text" placeholder="123 Main St, City, State ZIP">
    </div>
    <div class="mfield">
      <label for="buyerPhone">Phone Number</label>
      <input id="buyerPhone" type="tel" placeholder="(555) 555-5555">
    </div>
    <div class="mfield">
      <label for="buyerEmail">Email Address</label>
      <input id="buyerEmail" type="email" placeholder="you@example.com">
    </div>
    <p class="modal-error" id="modalError"></p>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closePurchaseModal()">Cancel</button>
      <button id="confirmPurchaseBtn">Confirm Purchase</button>
    </div>
  </div>
</div>

<div class="container">

  <h2>Saved Vehicle Configurations</h2>

  <div class="quick-links">
    <button onclick="window.location.href='/Sprint2-Charles/CheckoutPage.html?userId=' + localStorage.getItem('userId')">Cart & Orders</button>
  </div>

  <div id="carsList">
    Loading configurations...
  </div>

  <button class="page-action" onclick="window.location.href='/Sprint2-Charles/CustomerDashboard.html?userId=' + localStorage.getItem('userId')">
    Back to Dashboard
  </button>

</div>

<footer>
Parts Trading & Vehicle Customization Platform
</footer>

<script>

const userId = localStorage.getItem("userId");
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';

async function updateBuildStatus(carId, buildStatus) {
  const response = await fetch(`${API_BASE}/cars/${carId}/status`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userId,
      buildStatus
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error(errText || "Status update failed");
  }
}

let _pendingPurchaseCarId = null;

function openPurchaseModal(carId) {
  _pendingPurchaseCarId = carId;
  document.getElementById('buyerName').value = '';
  document.getElementById('buyerAddress').value = '';
  document.getElementById('buyerPhone').value = '';
  document.getElementById('buyerEmail').value = '';
  document.getElementById('modalError').textContent = '';
  document.getElementById('purchaseModal').classList.add('open');
}

function closePurchaseModal() {
  _pendingPurchaseCarId = null;
  document.getElementById('purchaseModal').classList.remove('open');
}

document.getElementById('confirmPurchaseBtn').addEventListener('click', async () => {
  const name = document.getElementById('buyerName').value.trim();
  const address = document.getElementById('buyerAddress').value.trim();
  const phone = document.getElementById('buyerPhone').value.trim();
  const email = document.getElementById('buyerEmail').value.trim();
  const errorEl = document.getElementById('modalError');

  if (!name || !address || !phone || !email) {
    errorEl.textContent = 'All fields are required.';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errorEl.textContent = 'Please enter a valid email address.';
    return;
  }

  const btn = document.getElementById('confirmPurchaseBtn');
  btn.disabled = true;
  errorEl.textContent = '';

  try {
    const response = await fetch(`${API_BASE}/cars/${_pendingPurchaseCarId}/purchase`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId,
        shippingAddress: `${name} | ${address} | ${phone} | ${email}`,
        paymentMethod: 'SIMULATED_CAR_PURCHASE'
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(errText || 'Purchase failed');
    }

    closePurchaseModal();
    await loadCars();
    alert('Build added to your orders successfully!');
  } catch (err) {
    errorEl.textContent = err.message || 'Could not complete purchase.';
  } finally {
    btn.disabled = false;
  }
});

async function loadCars() {

  try {

    const res = await fetch(`${API_BASE}/cars/` + userId);
    const cars = await res.json();

    const container = document.getElementById("carsList");
    container.innerHTML = "";

    if (cars.length === 0) {
      container.innerText = "No saved configurations.";
      return;
    }

    cars.forEach(c => {

      const div = document.createElement("div");
      div.className = "car";

      const partsText = Array.isArray(c.Parts) && c.Parts.length
        ? c.Parts.map(p => `${p.Name} (ID: ${p.PartID})`).join(", ")
        : (c.PartID ? `Part ${c.PartID}` : "None");

      // div.innerHTML =
      //   "<strong>Vehicle:</strong> " + c.BaseCar +
      //   "<br><strong>Total Price:</strong> $" + c.TotalPrice +
      //   "<br><strong>Parts:</strong> " + partsText;
      const paint = c.Parts?.find((p) => {
        const category = (p.Category || "").toLowerCase();
        const name = (p.Name || "").toLowerCase();
        return category === "paint" || name.includes("paint");
      });
      const rims = c.Parts?.find((p) => {
        const category = (p.Category || "").toLowerCase();
        const name = (p.Name || "").toLowerCase();
        return category === "wheel" || category === "rims" || name.includes("rim");
      });

      const paintName = paint ? paint.Name.replace(" Paint", "") : "No Color";
      const rimsName = rims ? rims.Name : "Stock Rims";
      
      let colorValue = "white";
      if (paintName.toLowerCase().includes("purple")) colorValue = "purple";
      else if (paintName.toLowerCase().includes("green")) colorValue = "green";
      else if (paintName.toLowerCase().includes("black")) colorValue = "black";

      let rimsValue = "basic";
      if (rimsName.toLowerCase().includes("black")) rimsValue = "blackSport";
      else if (rimsName.toLowerCase().includes("grey") || rimsName.toLowerCase().includes("silver")) rimsValue = "greySport";
      else if (rimsName.toLowerCase().includes("bronze")) rimsValue = "bronzeOffRoad";
      else if (rimsName.toLowerCase().includes("offroad")) rimsValue = "offRoadBlack";

      const imageUrl = `https://firebasestorage.googleapis.com/v0/b/legautocustdb.firebasestorage.app/o/${c.BaseCar}_${colorValue}_${rimsValue}_front.png?alt=media`;

      div.innerHTML = `
        <div class="car-row">
          <img src="${imageUrl}" class="car-img">
          <div class="car-info">
            <strong>Vehicle:</strong> ${c.BaseCar} | ${paintName} | ${rimsName}
            <br><strong>Total Price:</strong> $${c.TotalPrice}
            <br><strong>Parts:</strong> ${partsText}
          </div>
        </div>
      `;

      const actions = document.createElement("div");
      actions.className = "car-actions";

      const removeBtn = document.createElement("button");
      removeBtn.textContent = "Remove Build";
      removeBtn.addEventListener("click", async () => {
        const confirmed = window.confirm("Remove this saved configuration?");
        if (!confirmed) {
          return;
        }

        try {
          const deleteRes = await fetch(`${API_BASE}/cars/${c.CarID}?userId=${encodeURIComponent(userId)}`, {
            method: "DELETE"
          });

          if (!deleteRes.ok) {
            const errText = await deleteRes.text();
            throw new Error(errText || "Delete failed");
          }

          await loadCars();
        } catch (deleteErr) {
          console.error(deleteErr);
          alert("Could not remove configuration right now.");
        }
      });

      const buyBtn = document.createElement("button");
      buyBtn.textContent = "Add to Cart";
      buyBtn.addEventListener("click", () => {
        openPurchaseModal(c.CarID);
      });

      const editBtn = document.createElement("button");
      editBtn.textContent = "Edit";

      editBtn.addEventListener("click", () => {
          localStorage.setItem("editCar", JSON.stringify(c));
          window.location.href = "/Sprint4-Alberto/VehicleCreationPage.html?edit=true";
      });

      actions.appendChild(editBtn);

      actions.appendChild(removeBtn);
      actions.appendChild(buyBtn);
      div.appendChild(actions);
      container.appendChild(div);

    });

  } catch (err) {

    document.getElementById("carsList").innerText =
      "Error loading configurations.";

  }

}

loadCars();

</script>

</body>
</html>
