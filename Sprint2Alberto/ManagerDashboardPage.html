<!DOCTYPE html>
<html>
    <head>
        <title>Manager Dashboard Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
    </head>
    
    <body>
        <header><h1>Legacy Auto Company</h1></header>
        
        <div class = "container" style="justify-content: center;">
            
                <div class = "left section">
                    <h2 id="welcome">Hello Manager</h2>

                    <button onclick = "loadAttendance()">Attendance</button>
                    <br><br>
                    <button onclick = "loadTaxInfo()">Tax Info.</button>
                    <br><br>
                    <button onclick = "loadContactInfo()">Contact Info.</button>
                    <br><br>
                    <button onclick = "loadEmployeeOptions()">Employee Options</button>
                    <br><br>
                    <button onclick="loadChangePassword()">Change Password</button>
                    <br><br>
                    <button onclick="logout()">Logout</button>
                </div>
                
                <div class = "right section" id="InteractiveDisplay"></div>
                 
            
        </div>

        <footer><h2>This is legacy Auto Comp!!!!! we are excited to bring you a new perspective on creativity and hope to make your vision a reality</h2></footer>
            <script>
                window.onload = function(){
                    const params = new URLSearchParams(window.location.search);
                    const name = params.get("name");
                    const employeeID = params.get("EmployeeID");
                    console.log(name);
                    console.log(employeeID);
                    if (name){
                        document.getElementById("welcome").textContent = "Hello " + name;
                    }
                };

                let currentDate = new Date();

                function changeMonth(offset){
                    currentDate.setMonth(currentDate.getMonth() + offset);
 
                    if(document.getElementById("calendar")){
                        calendar();
                    }
                    const label = document.getElementById("monthLabel");
                    if(label){
                        label.innerText = currentDate.toLocaleString("default", { month: "long" });
                        document.getElementById("PaystubTable").innerHTML = "";
                    }
                }
                
                async function loadAttendance(){
                    const params = new URLSearchParams(window.location.search);
                    const employeeID = params.get("EmployeeID");
                    const res = await fetch(`/getPoints?EmployeeID=${employeeID}`);
                    const data = await res.json();

                    document.getElementById("InteractiveDisplay").innerHTML = `
                        <h2>Attendance</h2>
                        <div id="calendar"></div>
                        <br>
                        <p>Attendace Points: ${data.Points}</p>
                        <br>
                        <h3>Schedule Request Change</h3>
                        <form id="dayOffForm">
                            <input type="hidden" name="EmployeeID" value="${employeeID}">
                            
                            <label>Request Type</label>
                            <select id="requestType" name ="Type" required><br>
                                <option value="off">Request Off</option>
                                <option value="work">Request to Work</option>
                            </select><br><br>
                            
                            <label>Month</label><br>
                            <select name="MonthNum" required>
                                <option value="1">January</option>
                                <option value="2">February</option>
                                <option value="3">March</option>
                                <option value="4">April</option>
                                <option value="5">May</option>
                                <option value="6">June</option>
                                <option value="7">July</option>
                                <option value="8">August</option>
                                <option value="9">September</option>
                                <option value="10">October</option>
                                <option value="11">November</option>
                                <option value="12">December</option>
                            </select><br><br>

                            <label>Week</label><br>
                            <select id="weekSelect" name="WeekNum" required>
                                <option value="1">Week 1</option>
                                <option value="2">Week 2</option>
                                <option value="3">Week 3</option>
                                <option value="4">Week 4</option>
                                <option value="5">Week 5</option>
                                <option value="6">Week 6</option>
                            </select><br><br>
                            
                            <label>Day</label><br>
                            <select name="DayOfWeek" required>
                                <option value="Mon">Monday</option>
                                <option value="Tue">Tuesday</option>
                                <option value="Wed">Wednesday</option>
                                <option value="Thu">Thursday</option>
                                <option value="Fri">Friday</option>
                                <option value="Sat">Saturday</option>
                                <option value="Sun">Sunday</option>
                            </select><br><br>

                            <label>Reason</label><br>
                            <textarea name="Reason"></textarea><br><br>
                            
                            <button type="submit">Submit Request</button>
                        </form>
                        <p id="requestResult"></p>
                    `;

                    document.getElementById("dayOffForm").addEventListener("submit", async function(e){
                        e.preventDefault();
                        const formData = new FormData(this);
                        const res = await fetch("/request-dayoff", {
                            method: "POST",
                            body: new URLSearchParams(formData)
                        });
                        const text = await res.text();
                        document.getElementById("requestResult").textContent = text;
                    });
                    calendar();
                }

                async function calendar() {
                    const params = new URLSearchParams(window.location.search);
                    const employeeID = params.get("EmployeeID");
                    const res = await fetch(`/getSchedule?EmployeeID=${employeeID}`);
                    const data = await res.json();
                    const calendarDiv = document.getElementById("calendar");
                    const year = currentDate.getFullYear();
                    const month = currentDate.getMonth();
                    const firstDay = new Date(year, month, 1).getDay();
                    const lastDate = new Date(year, month + 1, 0).getDate();

                    let html = `
                        <div class="calendar-header">
                            <button onclick="changeMonth(-1)">Previous Month</button>
                            <h2>${currentDate.toLocaleString("default", { month: "long" })} ${currentDate.getFullYear()}</h2>
                            <button onclick="changeMonth(1)">Next Month</button>
                        </div>
                    
                        <div class="calendar-days">
                            <div>Sun</div>
                            <div>Mon</div>
                            <div>Tue</div>
                            <div>Wed</div>
                            <div>Thu</div>
                            <div>Fri</div>
                            <div>Sat</div>
                        </div>
                        
                        <div class="calendar-grid">`;

                    for (let i = 0; i < 42; i++) {
                        let dayNumber = i - firstDay + 1;
                        let displayNumber = dayNumber;
                        let isCurrentMonth = true;
                        if (dayNumber <= 0) {
                            const prevMonthLastDate = new Date(year, month, 0).getDate();
                            displayNumber = prevMonthLastDate + dayNumber;
                            isCurrentMonth = false;
                        }
                        else if (dayNumber > lastDate) {
                            displayNumber = dayNumber - lastDate;
                            isCurrentMonth = false;
                        }
                        let worked = false;
                        let display = "";

                        if (isCurrentMonth) {
                            const jsDay = new Date(year, month, dayNumber).getDay();
                            const map = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
                            const dayName = map[jsDay];
                            const week = Math.ceil((dayNumber + firstDay) / 7);

                            data.forEach(emp => {
                                if (
                                    Number(emp.MonthNum) === (month + 1) &&
                                    Number(emp.WeekNum) === week &&
                                    emp[dayName]
                                ) {worked = true;}
                            });

                            display = `<div>${displayNumber}</div>
                                <div>${worked ? "✅" : "❌"}</div>`;
                        } else {
                            display = `<div>${displayNumber}</div>`;
                        }
                        html += `<div class="day ${!isCurrentMonth ? "inactive" : worked ? "worked" : "off"}">${display}</div>`;
                    }
                    html += `</div>`;
                    calendarDiv.innerHTML = html;
                }

                async function loadTaxInfo(){
                    const params = new URLSearchParams(window.location.search);
                    const employeeID = params.get("EmployeeID");
                    const res = await fetch(`/getSchedule?EmployeeID=${employeeID}`);
                    const data = await res.json();

                    const weeks = [...new Set(
                        data
                        .filter(row => Number(row.MonthNum) === (currentDate.getMonth() + 1))
                        .map(row => Number(row.WeekNum))
                    )]
                    .filter(w => w <= 5)
                    .sort((a, b) => a - b);

                    let weekButtons = "";
                    weeks.forEach(w => {
                        weekButtons += `<button onclick="loadPaystub(${w})" style="width:120px;height:30px">Week ${w}</button>`;
                    });

                    document.getElementById("InteractiveDisplay").innerHTML = `
                        <h2>Tax Information</h2>
                        <div>
                            <button onclick="changeMonth(-1)">Last Month</button>
                            <span id="monthLabel">
                                ${currentDate.toLocaleString("default", { month: "long" })}
                            </span>
                            <button onclick="changeMonth(1)">Next Month</button>
                        </div>
                        <br><br>
                        <div>${weekButtons || "No schedule for this month"}</div>
                        <br><br>
                        <div id="PaystubTable"></div>
                    `;
                }

                async function loadPaystub(week){
                    const params = new URLSearchParams(window.location.search);
                    const employeeID = params.get("EmployeeID");
                    const res = await fetch(`/getSchedule?EmployeeID=${employeeID}`);
                    const data = await res.json();
                    const schedule = data.find(row => row.WeekNum == week && row.MonthNum == (currentDate.getMonth() + 1));
                    
                    if(!schedule){
                        document.getElementById("PaystubTable").innerHTML = "No schedule found.";
                        return;
                    }
                    let daysWorked = 0;
                    if(schedule.Mon) daysWorked++;
                    if(schedule.Tue) daysWorked++;
                    if(schedule.Wed) daysWorked++;
                    if(schedule.Thu) daysWorked++;
                    if(schedule.Fri) daysWorked++;
                    if(schedule.Sat) daysWorked++;
                    if(schedule.Sun) daysWorked++;
                    
                    const payRes = await fetch(`/getEmployeePay?EmployeeID=${employeeID}`);
                    const payData = await payRes.json();
                    const hourlyPay = payData.HourlyPay;
                    const hoursWorked = daysWorked * 8;
                    const grossPay = hoursWorked * hourlyPay;
                    const federal = grossPay * 0.12;
                    const state = grossPay * 0.09;
                    const social = grossPay * 0.03;
                    const medicare = grossPay * 0.016;
                    const totalTaxes = federal + state + social + medicare;
                    const netPay = grossPay - totalTaxes;
                    document.getElementById("PaystubTable").innerHTML = `
                    <table border="1">
                        <tr><th>Days Worked</th> <th>Hours Worked</th> <th>Hourly Pay</th> <th>Gross Pay</th> </tr>
                        <tr>
                            <td>${daysWorked}</td>
                            <td>${hoursWorked}</td>
                            <td>$${hourlyPay}</td>
                            <td>$${grossPay.toFixed(2)}</td>
                        </tr>
                    </table>
                    <table border="1">
                        <tr> <th>Federal Income Tax</th> <th>State Income Tax</th> <th>Social Security</th> <th>Medicare</th> <th>Total Taxes</th> <th>Net Pay</th> </tr>
                        <tr>
                            <td>$${federal.toFixed(2)}</td>
                            <td>$${state.toFixed(2)}</td>
                            <td>$${social.toFixed(2)}</td>
                            <td>$${medicare.toFixed(2)}</td>
                            <td>$${totalTaxes.toFixed(2)}</td>
                            <td>$${netPay.toFixed(2)}</td>
                        </tr>
                    </table>
                    `;
                }
                
                async function loadContactInfo(){
                    const params = new URLSearchParams(window.location.search);
                    const employeeID = params.get("EmployeeID");
                    const res = await fetch(`/contactInfo?EmployeeID=${employeeID}`);
                    const data = await res.json();

                    document.getElementById("InteractiveDisplay").innerHTML = `
                    <h2>Contact Information</h2>
                    <table> <table border="1">
                    <tr><th>Phone Number:</th><td>${data.PhoneNumber}</td></tr>
                    <tr><th>Emergency Phone:</th><td>${data.EmergencyPhoneNumber}</td></tr>
                    <tr><th>Address:</th><td>${data.Address}</td></tr>
                    <tr><th>Personal Email:</th><td>${data.PersonalEmail}</td></tr>
                    <tr><th>Work Email:</th><td>${data.WorkEmail}</td></tr>
                    </table>
                    `;
                }

                function loadEmployeeOptions(){
                    document.getElementById("InteractiveDisplay").innerHTML = `<h2>Employee Options</h2>
                    <button onclick="loadRequests()">Approve / Deny Day Off Requests</button>
                    <br><br>
                    <button onclick="loadEmployeeStats()">View Employee Stats</button>
                    <br><br>
                    <button onclick="loadDisciplinary()">Disciplinary Actions</button>
                    <br><br>
                    <button onclick="loadRecognition()">Employee Recognition</button>
                    `;
                }
                
                async function loadRequests(){
                    const res = await fetch("/getTimeOffRequests");
                    const data = await res.json();
                    let html = `<h2>Time Off Requests</h2>
                    <table border="1">
                    <tr> <th>Employee</th> <th>Month</th> <th>Week</th> <th>Day</th> <th>Type</th> <th>Reason</th> <th>Action</th> </tr>`;
                    data.forEach(request => {
                        html += `
                        <tr>
                            <td>${request.FirstName} ${request.LastName}</td>
                            <td>${request.MonthNum}</td>
                            <td>${request.WeekNum}</td>
                            <td>${request.DayOfWeek}</td>
                            <td>${request.Type}</td>
                            <td>${request.Reason}</td>
                            <td>
                            <button onclick="approveRequest(${request.RequestID})">Approve</button>
                            <button onclick="denyRequest(${request.RequestID})">Deny</button>
                            </td>
                        </tr>`;
                    });
                    html += "</table>";
                    document.getElementById("InteractiveDisplay").innerHTML = html;
                }

                async function approveRequest(id){
                    await fetch("/approveRequest",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({RequestID:id})
                    });
                    loadRequests();
                }

                async function denyRequest(id){
                    await fetch("/denyRequest",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({RequestID:id})
                    });
                    loadRequests();
                }

                async function loadEmployeeStats(){
                    const res = await fetch("/getEmployees");
                    const data = await res.json();

                    let html = `<h2>Employee Stats</h2> <select id="employeeSelect">`;
                    data.forEach(emp=>{
                        html += `
                        <option value="${emp.EmployeeID}">
                        ${emp.FirstName} ${emp.LastName}
                        </option>`;
                    });
                    html += `</select>
                    <br><br>
                    <button onclick="viewEmployeeStats()">View Stats</button>
                    `;
                    document.getElementById("InteractiveDisplay").innerHTML = html;
                }

                async function viewEmployeeStats(){
                    const employeeID = document.getElementById("employeeSelect").value;
                    const res = await fetch(`/getEmployeeStats?EmployeeID=${employeeID}`);
                    const data = await res.json();
                    const status = Number(data.ActivelyEmployed) === 1 ? "Employed" : "Terminated";
                    document.getElementById("InteractiveDisplay").innerHTML = `
                    <h2>${data.FirstName} ${data.LastName}</h2>
                    <p>Employee ID: ${data.EmployeeID}</p>
                    <p>Points: ${data.Points}</p>
                    <p>Comments: ${data.Comments}</p>
                    <p>Hourly Pay: $${data.HourlyPay}</p>
                    <p>Employment Status: ${status}</p>
                    `;
                }

                async function loadDisciplinary(){
                    const res = await fetch("/getEmployees");
                    const data = await res.json();

                    let html = `<h2>Disciplinary Actions</h2> <select id="disciplineEmployee">`;
                    data.forEach(emp=>{
                        html += `
                        <option value="${emp.EmployeeID}">
                        ${emp.FirstName} ${emp.LastName}
                        </option>`;
                    });

                    html += `</select>
                    <br><br>
                    <button onclick="viewDiscipline()">View Employee</button>`;
                    document.getElementById("InteractiveDisplay").innerHTML = html;
                }
                
                async function viewDiscipline(employeeID){
                    if(!employeeID){
                        employeeID = document.getElementById("disciplineEmployee").value;
                    }

                    const res = await fetch(`/getEmployeeStats?EmployeeID=${employeeID}`);
                    const data = await res.json();

                    document.getElementById("InteractiveDisplay").innerHTML = `
                    <h2>${data.FirstName} ${data.LastName}</h2>
                    <p>Current Points: ${data.Points}</p>
                    <label>Add Points</label>

                    <input type="number" id="pointsToAdd">
                    <br><br>
                    
                    <button onclick="addPoints('${employeeID}')">Add Points</button>
                    <br><br>

                    <button onclick="terminateEmployee('${employeeID}')">Terminate Employee</button>`;
                }

                async function addPoints(employeeID){
                    const points = document.getElementById("pointsToAdd").value;

                    await fetch("/addPoints",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({
                            EmployeeID:employeeID,
                            points:points
                        })
                    });

                    viewDiscipline(employeeID);
                }

                async function terminateEmployee(employeeID){
                    if(!confirm("Are you sure?")) return;

                    await fetch("/terminateEmployee",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({
                            EmployeeID:employeeID
                        })
                    });
                    loadEmployeeOptions();
                }

                async function loadRecognition(){
                    const res = await fetch("/getEmployees");
                    const data = await res.json();

                    let html = `<h2>Employee Recognition</h2>
                    <select id="recognitionEmployee">`;
                    data.forEach(emp=>{
                        html += `
                        <option value="${emp.EmployeeID}">
                        ${emp.FirstName} ${emp.LastName}
                        </option>
                        `;
                    });
                    html += `</select>
                    <br><br>

                    <button onclick="viewRecognition()">View Employee</button>`;
                    document.getElementById("InteractiveDisplay").innerHTML = html;
                }

                async function viewRecognition(employeeID){
                    if(!employeeID){
                        employeeID = document.getElementById("recognitionEmployee").value;
                    }

                    const res = await fetch(`/getEmployeeStats?EmployeeID=${employeeID}`);
                    const data = await res.json();

                    document.getElementById("InteractiveDisplay").innerHTML = `
                    <h2>${data.FirstName} ${data.LastName}</h2>
                    <p>Current Pay: $${data.HourlyPay}</p>
                    <label>Raise Amount</label>
                    <input type="number" id="raiseAmount">
                    <br><br>

                    <button onclick="giveRaise('${employeeID}')">Give Raise</button>
                    <br><br>

                    <label>Recognition Comment</label>
                    <textarea id="recognitionComment"></textarea>
                    <br><br>

                    <button onclick="addRecognition('${employeeID}')">Save Comment</button>
                    <br><br>

                    <button onclick="rehireEmployee('${employeeID}')">Rehire Employee</button>
                    <br><br>

                    <button onclick="promoteManager('${employeeID}')">Promote to Manager</button>
                    `;
                }

                async function giveRaise(employeeID){
                    const raise = document.getElementById("raiseAmount").value;

                    if(!raise || raise <= 0){
                        return;
                    }
                    await fetch("/giveRaise",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({
                            EmployeeID:employeeID,
                            raise:raise
                        })
                    });
                    alert("Raise Submitted");
                    viewRecognition(employeeID);
                }

                async function addRecognition(employeeID){
                    const comment = document.getElementById("recognitionComment").value;

                    if(!comment){
                        return;
                    }
                    await fetch("/recognitionComment",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({
                            EmployeeID:employeeID,
                            comment:comment
                        })
                    });
                    alert("Comment Submitted.");
                    viewRecognition(employeeID);
                }

                async function rehireEmployee(employeeID){
                    await fetch("/rehireEmployee",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({
                            EmployeeID:employeeID
                        })
                    });
                    alert("Employee rehired");
                    viewRecognition(employeeID);
                }

                async function promoteManager(employeeID){
                    if(!confirm("Promote this employee to manager?")) return;

                    await fetch("/promoteManager",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({
                            EmployeeID:employeeID
                        })
                    });
                }
                
                function loadChangePassword(){
                    document.getElementById("InteractiveDisplay").innerHTML = `
                        <h2>Change Password</h2>

                        <label>Old Password</label><br>
                        <input type="password" id="oldPassword">
                        <br><br>
                        <label>New Password</label><br>
                        <input type="password" id="newPassword">
                        <br><br>
                        <button onclick="changePassword()">Update Password</button>

                        <p id="passwordResult"></p>
                    `;
                }
                
                async function changePassword(){
                    const params = new URLSearchParams(window.location.search);
                    const EmployeeID = params.get("EmployeeID");
                    const oldPassword = document.getElementById("oldPassword").value;
                    const newPassword = document.getElementById("newPassword").value;
                    const res = await fetch("/changePassword",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({
                            EmployeeID:EmployeeID,
                            oldPassword:oldPassword,
                            newPassword:newPassword
                        })
                    });
                    const text = await res.text();
                    document.getElementById("passwordResult").innerText = text;
                }

                function logout(){
                    localStorage.removeItem("userSession");
                    localStorage.removeItem("userId");
                    localStorage.removeItem("username");
                    window.location.href = "/index.html";
                }
        </script>
    </body>
</html>
